            - generic [ref=e234]:
              - paragraph [ref=e235]: "Before arrival, Aurora Salinas will set the terrace with heaters, tea linen, and gaiwan service so that the 2010 cooked pu-erh is ready when Mr. and Mrs. Liu step in — the fog still holding, the bay-laurel scent carrying in from the herb garden below. From the terrace they can look into the garden when they are ready; the water feature is quiet and walkable from 7:45, and the lawn will be empty until the marine layer begins to lift around 10. This is the single anchor for the morning: tea, fog, and the garden at its most still — nothing scheduled after it."
              - paragraph [ref=e236]: "Mr. and Mrs. Liu carry a West Lake sensibility — water, mist, seasonal attunement, unhurried presence — and their anniversary framing is explicitly inward, a returning-together rather than an encounter with the new. The Sand Hill fog at 8am is not a California weather event; it is the closest this property comes to the low-lying mist that sits over West Lake on a late-spring morning, and the cooked pu-erh — earthen, aged, slow to open — carries something of that same register across the Pacific in a way that the brighter Longjing does not, for this particular hour and phase. Water-phase pacing calls for one anchor per half-day, held lightly: the terrace tea is that anchor, and the garden walk is available to them if they move toward it, not presented as a second item on a list. The gap in designated quiet space is real — there is no meditation room — but the terrace-into-garden sequence, prepared before they arrive and then left entirely to them, functions as the honest equivalent: private, sensory, unhurried, requiring nothing of them."
